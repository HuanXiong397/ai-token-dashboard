version: '3.9'

services:
  app:
    build: .
    container_name: ai-token-dashboard
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-ai-dashboard-secret-2026}
      - DB_PATH=/app/data/dashboard.db
      - CORS_ORIGIN=*
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  db-data:
