[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'cd /app/server && node --experimental-sqlite --import tsx/esm src/db/seed.ts 2>/dev/null; node --experimental-sqlite --import tsx/esm src/index.ts'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
